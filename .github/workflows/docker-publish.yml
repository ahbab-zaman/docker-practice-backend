name: Build and Push Backend Image

# WHEN this workflow runs
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    # GitHub provides a temporary Linux machine to run this job on
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repo's code onto that temporary machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub using the secrets you created earlier
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build the image (same as your local "docker build")
      # and push it (same as your local "docker push") — combined here
      # into one step for efficiency.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ahbabzaman/docker-backend-practice:v.1.0